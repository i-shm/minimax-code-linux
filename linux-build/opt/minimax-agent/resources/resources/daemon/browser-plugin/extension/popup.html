<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mavis Browser Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: #1a1a1a; background: #fff; }
    .header { padding: 12px 16px; background: #f8f9fa; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-off { background: #fef2f2; color: #991b1b; }
    .badge-partial { background: #fef3c7; color: #92400e; }
    .section { padding: 12px 16px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #6b7280; margin-bottom: 8px; letter-spacing: 0.5px; }
    .profile-list { list-style: none; }
    .profile-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
    .profile-item:last-child { border-bottom: none; }
    .profile-name { font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .profile-actions { display: flex; gap: 4px; }
    .btn-sm { padding: 2px 8px; font-size: 11px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; cursor: pointer; }
    .btn-sm:hover { background: #f3f4f6; }
    .btn-danger { color: #dc2626; border-color: #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .add-form { display: flex; gap: 6px; margin-top: 8px; }
    .add-form input { flex: 1; padding: 6px 8px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; outline: none; }
    .add-form input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
    .add-form button { padding: 6px 12px; font-size: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
    .add-form button:hover { background: #2563eb; }
    .footer { padding: 8px 16px; border-top: 1px solid #e5e7eb; text-align: center; }
    .footer button { padding: 6px 16px; font-size: 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; }
    .footer button:hover { background: #e5e7eb; }
    .status-msg { font-size: 11px; color: #6b7280; margin-top: 4px; min-height: 16px; }
    .empty { color: #9ca3af; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Mavis Browser Bridge</h1>
    <span id="headerBadge" class="badge badge-off">offline</span>
  </div>

  <div class="section">
    <div class="section-title">Profiles</div>
    <ul id="profileList" class="profile-list">
      <li class="empty">Loading...</li>
    </ul>
    <div class="add-form">
      <input id="newProfileInput" type="text" placeholder="Profile name (e.g. dev)" />
      <button id="addProfileBtn">Add</button>
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <div class="footer">
    <button id="reconnectAllBtn">Reconnect All</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
